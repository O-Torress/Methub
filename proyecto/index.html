<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN GLOBAL -->
    <header>
        <nav id="navbar">
            <a href="#home" id="logo">
                <img src="img/logo.webp" alt="MetHub" height="60">
            </a>

            <div class="nav-links">
                <a href="#explorar" id="link-explore">Explorar</a>
                <a href="#departamentos" id="link-departments">Departamentos</a>
                <a href="#comparar" id="link-compare">Comparador</a>
            </div>
        </nav>
    </header>

    <!-- CONTENEDOR DINÁMICO -->
    <main id="view-container">
        
    </main>

    <!-- FOOTER-->
    <footer>
        <p>Datos provistos por la Open Access API del Metropolitan Museum of Art. Esta aplicación no está afiliada al museo.</p>
        <p>Desarrollado por: Oscar Torres y Santiago Leal | 2026</p>
    </footer>
    
    <!-- CARGA DE SCRIPTS -->
    
    <script src="js/components/loading-state.js"></script>
    <script src="js/components/error-state.js"></script>
    
    <!-- Módulos de Vistas -->
    <script src="js/views/home.js"></script>
    <script src="js/views/explorar.js"></script>
    <script src="js/views/detalles.js"></script>
    <script src="js/views/departamentos.js"></script>
    <script src="js/views/artista.js"></script>
    <script src="js/views/comparacion.js"></script>

    <!-- Enrutador y Lógica de inicialización -->
    <script src="js/app.js"></script>
</body>
</html>
